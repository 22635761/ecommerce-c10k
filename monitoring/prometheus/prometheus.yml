global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'auth-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['auth-service:3001']
        labels:
          service: 'auth'

  - job_name: 'product-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['product-service:3002']
        labels:
          service: 'product'

  - job_name: 'cart-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['cart-service:3005']
        labels:
          service: 'cart'

  - job_name: 'order-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['order-service:3004']
        labels:
          service: 'order'

  - job_name: 'discount-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['discount-service:3006']
        labels:
          service: 'discount'

  - job_name: 'chat-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['chat-service:3007']
        labels:
          service: 'chat'
