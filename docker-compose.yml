services:
  mongodb:
    image: mongo:7
    container_name: mongodb-repl
    restart: always
    ports:
      - "27018:27017"
    volumes:
      - mongodb_data:/data/db
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all", "--port", "27017"]
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.adminCommand({ ping: 1 })' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  mongo-init:
    image: mongo:7
    container_name: mongodb-init-repl
    depends_on:
      mongodb:
        condition: service_healthy
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "mongosh --host mongodb:27017 --eval '
      try {
        rs.status();
        print(\"Replica set already initialized\");
      } catch (e) {
        rs.initiate({
          _id: \"rs0\",
          members: [{ _id: 0, host: \"mongodb:27017\" }]
        });
        print(\"Replica set initiated\");
      }'"
    networks:
      - ecommerce-network

  redis:
    image: redis:7-alpine
    container_name: redis-cache
    restart: always
    ports:
      - "6379:6379"
    networks:
      - ecommerce-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: password
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-network

  auth-service:
    build: ./services/auth-service
    container_name: auth-service
    restart: always
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: mongodb://mongodb:27017/ecommerce-auth?replicaSet=rs0
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3001
      REDIS_HOST: redis-cache
      REDIS_PORT: 6379
      NODE_ENV: production
      SMTP_EMAIL: ${SMTP_EMAIL:-"noreply.zerophone@gmail.com"}
      SMTP_PASS: ${SMTP_PASS:-"demo"}
    depends_on:
      mongo-init:
        condition: service_completed_successfully
      redis:
        condition: service_started
    networks:
      - ecommerce-network

  product-service:
    build: ./services/product-service
    container_name: product-service
    restart: always
    ports:
      - "3002:3002"
    environment:
      DATABASE_URL: mongodb://mongodb:27017/ecommerce-product?replicaSet=rs0
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3002
      REDIS_HOST: redis-cache
      REDIS_PORT: 6379
      RABBITMQ_URL: amqp://admin:password@rabbitmq:5672
      NODE_ENV: production
    depends_on:
      mongo-init:
        condition: service_completed_successfully
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
    networks:
      - ecommerce-network

  order-service:
    build: ./services/order-service
    container_name: order-service
    restart: always
    ports:
      - "3004:3004"
    environment:
      DATABASE_URL: mongodb://mongodb:27017/ecommerce-order?replicaSet=rs0
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3004
      REDIS_HOST: redis-cache
      REDIS_PORT: 6379
      NODE_ENV: production
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      SEPAY_MERCHANT_ID: ${SEPAY_MERCHANT_ID}
      SEPAY_SECRET_KEY: ${SEPAY_SECRET_KEY}
      SEPAY_ENV: ${SEPAY_ENV}
      SEPAY_RETURN_URL: ${SEPAY_RETURN_URL}
      SEPAY_IPN_URL: ${SEPAY_IPN_URL}
      RABBITMQ_URL: amqp://admin:password@rabbitmq:5672
      GHN_TOKEN: b29f8bbf-349f-11f1-a973-aee5264794df
      GHN_SHOP_ID: "199917"
      GHN_BASE_URL: https://dev-online-gateway.ghn.vn/shiip/public-api
    depends_on:
      mongo-init:
        condition: service_completed_successfully
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
      auth-service:
        condition: service_started
    networks:
      - ecommerce-network

  cart-service:
    build: ./services/cart-service
    container_name: cart-service
    restart: always
    ports:
      - "3005:3005"
    environment:
      DATABASE_URL: mongodb://mongodb:27017/ecommerce-cart?replicaSet=rs0
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3005
      REDIS_HOST: redis-cache
      REDIS_PORT: 6379
      NODE_ENV: production
    depends_on:
      mongo-init:
        condition: service_completed_successfully
      redis:
        condition: service_started
    networks:
      - ecommerce-network

  discount-service:
    build: ./services/discount-service
    container_name: discount-service
    restart: always
    ports:
      - "3006:3006"
    environment:
      DATABASE_URL: mongodb://mongodb:27017/ecommerce-discount?replicaSet=rs0
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3006
      REDIS_HOST: redis-cache
      REDIS_PORT: 6379
      NODE_ENV: production
    depends_on:
      mongo-init:
        condition: service_completed_successfully
      redis:
        condition: service_started
    networks:
      - ecommerce-network

  chat-service:
    build: ./services/chat-service
    container_name: chat-service
    restart: always
    ports:
      - "3007:3007"
    environment:
      PORT: 3007
      NODE_ENV: production
      REDIS_URL: redis://redis-cache:6379
    networks:
      - ecommerce-network

  frontend:
    build: ./frontend
    container_name: frontend
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    environment:
      REACT_APP_API_BASE_URL: ""
      WDS_SOCKET_PORT: 0
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      - auth-service
      - product-service
      - cart-service
      - order-service
      - discount-service
      - chat-service
    networks:
      - ecommerce-network

  gateway:
    image: nginx:1.27-alpine
    container_name: gateway
    restart: always
    depends_on:
      - frontend
      - auth-service
      - product-service
      - cart-service
      - order-service
      - discount-service
      - chat-service
    ports:
      - "8080:80"
    volumes:
      - ./gateway/nginx.local.conf:/etc/nginx/nginx.conf:ro
    networks:
      - ecommerce-network

  ngrok:
    image: ngrok/ngrok:latest
    container_name: ngrok-tunnel
    restart: always
    ports:
      - "4040:4040"
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    command:
      - "http"
      - "order-service:3004"
      - "--log=stdout"
    depends_on:
      - order-service
    networks:
      - ecommerce-network

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
    networks:
      - ecommerce-network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: always
    ports:
      - "3030:3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    depends_on:
      - prometheus
    networks:
      - ecommerce-network

networks:
  ecommerce-network:
    driver: bridge

volumes:
  mongodb_data:
  prometheus_data:
  grafana_data:
